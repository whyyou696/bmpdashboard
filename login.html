<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Multi Payment - Login</title>
    <meta name="description" content="Sign in to access Best Multi Payment monitoring dashboard.">
    <link rel="icon" type="image/png" href="assets/logo_best.png">
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Animated Background Blobs -->
    <div class="bg-bubbles">
        <div class="bubble bubble-1"></div>
        <div class="bubble bubble-2"></div>
        <div class="bubble bubble-3"></div>
    </div>

    <!-- Login Screen -->
    <div class="login-container" id="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="assets/logo_best.png" alt="Best Multi Payment Logo" class="login-logo">
                <h2>BMP Dashboard</h2>
                <p>Sign in to access your Dashboard</p>
            </div>
            <div class="vpn-alert">
                <i class="fa-solid fa-shield-halved"></i>
                <span>Please Connect to your OpenVPN before</span>
            </div>
            <form id="login-form" class="login-form">
                <div class="input-group">
                    <label for="username"><i class="fa-regular fa-user"></i> Username</label>
                    <input type="text" id="username" required placeholder="Enter your username" autocomplete="username">
                </div>
                <div class="input-group">
                    <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" required placeholder="Enter your password"
                            autocomplete="current-password">
                        <i class="fa-regular fa-eye toggle-password" id="toggle-password"></i>
                    </div>
                </div>
                <div class="error-box" id="error-box" style="display: none;">
                    <i class="fa-solid fa-circle-exclamation"></i> <span id="error-msg">Invalid credentials</span>
                </div>
                <button type="submit" class="btn-login" id="btn-login">
                    <span>Sign In</span> <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Script file -->
    <script src="js/login.js"></script>
</body>

</html>
